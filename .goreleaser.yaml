version: 2

project_name: mysqlmonitoring

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: mysqlmonitoring
    binary: mysqlmonitoring
    main: ./cmd/mysqlmonitoring
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Other
      order: 999

release:
  github:
    owner: eugenetaranov
    name: mysqlmonitoring
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## mysqlmonitoring {{ .Version }}

    MySQL lock monitor - detect lock contention, long transactions, and deadlocks.
  footer: |
    ## Installation

    ### Homebrew (macOS/Linux)
    ```bash
    brew install eugenetaranov/tap/mysqlmonitoring
    ```

    ### Direct Download
    Download the appropriate binary for your platform from the assets below.

    ### Build from Source
    ```bash
    go install github.com/eugenetaranov/mysqlmonitoring/cmd/mysqlmonitoring@{{ .Tag }}
    ```

# Homebrew Tap
brews:
  - name: mysqlmonitoring
    repository:
      owner: eugenetaranov
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/eugenetaranov/mysqlmonitoring"
    description: "MySQL lock monitor - detect lock contention, long transactions, and deadlocks"
    license: "MIT"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    dependencies:
      - name: go
        type: optional
    test: |
      system "#{bin}/mysqlmonitoring", "--version"
    install: |
      bin.install "mysqlmonitoring"
